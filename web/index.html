<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CollabFuture — Your Family's Future Planned Together">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CollabFuture">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>CollabFuture</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #2C2F4C; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #2C2F4C 0%, #1E2038 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading .logo {
      width: 80px; height: 80px;
      background: #58C4F4;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 12px 32px rgba(88,196,244,0.35);
    }
    #loading .logo svg { width: 40px; height: 40px; fill: white; }
    #loading h1 { color: #FFFFFF; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    #loading p  { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 36px; }
    #loading .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(88,196,244,0.2);
      border-top-color: #58C4F4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
      </svg>
    </div>
    <h1>CollabFuture</h1>
    <p>Your Family's Future Planned Together</p>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
