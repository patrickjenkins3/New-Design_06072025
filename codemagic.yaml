workflows:

  # ── Android Preview APK (no signing required) ──────────────
  android-preview:
    name: Android Preview APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.0
      vars:
        SUPABASE_URL:           "https://alyqcfxwjsqlexuzfqqj.supabase.co"
        SUPABASE_ANON_KEY:      $SUPABASE_ANON_KEY       # set in Codemagic UI
        OPENAI_API_KEY:         $OPENAI_API_KEY           # set in Codemagic UI
        STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY   # set in Codemagic UI
        APP_SECRET_KEY:         $APP_SECRET_KEY           # set in Codemagic UI
        ENCRYPTION_KEY:         $ENCRYPTION_KEY           # set in Codemagic UI
        PASSWORD_RESET_URL:     "https://collabfuture.com/reset-password"
        COLLEGE_SCORECARD_KEY:  $COLLEGE_SCORECARD_KEY
        CAREERONESTOP_USERID:   $CAREERONESTOP_USERID
        CAREERONESTOP_TOKEN:    $CAREERONESTOP_TOKEN

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK (no signing needed for preview)
        script: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY \
            --dart-define=APP_SECRET_KEY=$APP_SECRET_KEY \
            --dart-define=ENCRYPTION_KEY=$ENCRYPTION_KEY \
            --dart-define=PASSWORD_RESET_URL=$PASSWORD_RESET_URL \
            --dart-define=COLLEGE_SCORECARD_KEY=$COLLEGE_SCORECARD_KEY \
            --dart-define=CAREERONESTOP_USERID=$CAREERONESTOP_USERID \
            --dart-define=CAREERONESTOP_TOKEN=$CAREERONESTOP_TOKEN

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - patrickjenkins3@github.com   # update to your real email
        notify:
          success: true
          failure: true

  # ── iOS Preview (requires Apple Developer account) ──────────
  ios-preview:
    name: iOS Preview IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.0
      ios_signing:
        distribution_type: development   # use ad_hoc for wider distribution
        bundle_identifier: com.nextmatric.app
      vars:
        SUPABASE_URL:           "https://alyqcfxwjsqlexuzfqqj.supabase.co"
        SUPABASE_ANON_KEY:      $SUPABASE_ANON_KEY
        OPENAI_API_KEY:         $OPENAI_API_KEY
        STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY
        APP_SECRET_KEY:         $APP_SECRET_KEY
        ENCRYPTION_KEY:         $ENCRYPTION_KEY
        PASSWORD_RESET_URL:     "https://collabfuture.com/reset-password"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          flutter build ipa --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY \
            --dart-define=APP_SECRET_KEY=$APP_SECRET_KEY \
            --dart-define=ENCRYPTION_KEY=$ENCRYPTION_KEY \
            --dart-define=PASSWORD_RESET_URL=$PASSWORD_RESET_URL

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - patrickjenkins3@github.com
        notify:
          success: true
          failure: true
