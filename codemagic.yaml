workflows:

  # ── Web Preview (desktop browser — GitHub Pages) ────────────
  web-preview:
    name: Web Preview (GitHub Pages)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      vars:
        SUPABASE_URL:           "https://alyqcfxwjsqlexuzfqqj.supabase.co"
        SUPABASE_ANON_KEY:      $SUPABASE_ANON_KEY
        OPENAI_API_KEY:         $OPENAI_API_KEY
        STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY
        APP_SECRET_KEY:         $APP_SECRET_KEY
        ENCRYPTION_KEY:         $ENCRYPTION_KEY
        PASSWORD_RESET_URL:     "https://collabfuture.com/reset-password"
        COLLEGE_SCORECARD_KEY:  $COLLEGE_SCORECARD_KEY
        CAREERONESTOP_USERID:   $CAREERONESTOP_USERID
        CAREERONESTOP_TOKEN:    $CAREERONESTOP_TOKEN
        GITHUB_TOKEN:           $GITHUB_TOKEN   # set in Codemagic UI — use your GitHub PAT

    scripts:
      - name: Enable Flutter web
        script: flutter config --enable-web

      - name: Add web platform to project
        script: flutter create . --platforms web --project-name collab_future

      - name: Get packages
        script: flutter pub get

      - name: Build Flutter web
        script: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY \
            --dart-define=APP_SECRET_KEY=$APP_SECRET_KEY \
            --dart-define=ENCRYPTION_KEY=$ENCRYPTION_KEY \
            --dart-define=PASSWORD_RESET_URL=$PASSWORD_RESET_URL \
            --dart-define=COLLEGE_SCORECARD_KEY=$COLLEGE_SCORECARD_KEY \
            --dart-define=CAREERONESTOP_USERID=$CAREERONESTOP_USERID \
            --dart-define=CAREERONESTOP_TOKEN=$CAREERONESTOP_TOKEN \
            --base-href /New-Design_06072025/

      - name: Deploy to GitHub Pages
        script: |
          cd build/web

          # Configure git
          git config --global user.email "ci@collabfuture.app"
          git config --global user.name "CollabFuture CI"

          # Push to gh-pages branch
          git init
          git add -A
          git commit -m "Deploy web build $(date +%Y-%m-%d_%H:%M)"
          git push --force \
            https://patrickjenkins3:$GITHUB_TOKEN@github.com/patrickjenkins3/New-Design_06072025.git \
            HEAD:gh-pages

          echo "✅ Live at: https://patrickjenkins3.github.io/New-Design_06072025/"

    artifacts:
      - build/web/**

    publishing:
      email:
        recipients:
          - patrickjenkins3@github.com
        notify:
          success: true
          failure: true

  # ── Android Preview APK (no signing required) ──────────────
  android-preview:
    name: Android Preview APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      vars:
        SUPABASE_URL:           "https://alyqcfxwjsqlexuzfqqj.supabase.co"
        SUPABASE_ANON_KEY:      $SUPABASE_ANON_KEY
        OPENAI_API_KEY:         $OPENAI_API_KEY
        STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY
        APP_SECRET_KEY:         $APP_SECRET_KEY
        ENCRYPTION_KEY:         $ENCRYPTION_KEY
        PASSWORD_RESET_URL:     "https://collabfuture.com/reset-password"
        COLLEGE_SCORECARD_KEY:  $COLLEGE_SCORECARD_KEY
        CAREERONESTOP_USERID:   $CAREERONESTOP_USERID
        CAREERONESTOP_TOKEN:    $CAREERONESTOP_TOKEN

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY \
            --dart-define=APP_SECRET_KEY=$APP_SECRET_KEY \
            --dart-define=ENCRYPTION_KEY=$ENCRYPTION_KEY \
            --dart-define=PASSWORD_RESET_URL=$PASSWORD_RESET_URL \
            --dart-define=COLLEGE_SCORECARD_KEY=$COLLEGE_SCORECARD_KEY \
            --dart-define=CAREERONESTOP_USERID=$CAREERONESTOP_USERID \
            --dart-define=CAREERONESTOP_TOKEN=$CAREERONESTOP_TOKEN

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - patrickjenkins3@github.com
        notify:
          success: true
          failure: true

  # ── iOS Preview (requires Apple Developer account) ──────────
  ios-preview:
    name: iOS Preview IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      ios_signing:
        distribution_type: development
        bundle_identifier: com.nextmatric.app
      vars:
        SUPABASE_URL:           "https://alyqcfxwjsqlexuzfqqj.supabase.co"
        SUPABASE_ANON_KEY:      $SUPABASE_ANON_KEY
        OPENAI_API_KEY:         $OPENAI_API_KEY
        STRIPE_PUBLISHABLE_KEY: $STRIPE_PUBLISHABLE_KEY
        APP_SECRET_KEY:         $APP_SECRET_KEY
        ENCRYPTION_KEY:         $ENCRYPTION_KEY
        PASSWORD_RESET_URL:     "https://collabfuture.com/reset-password"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          flutter build ipa --debug \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY \
            --dart-define=APP_SECRET_KEY=$APP_SECRET_KEY \
            --dart-define=ENCRYPTION_KEY=$ENCRYPTION_KEY \
            --dart-define=PASSWORD_RESET_URL=$PASSWORD_RESET_URL

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - patrickjenkins3@github.com
        notify:
          success: true
          failure: true
